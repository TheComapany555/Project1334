# M1.2 — Follow-ups due notifier. Daily at ~8am AEST (22:00 UTC).
#
# Emits a `follow_up_due` in-app notification for every open follow-up
# whose due_at::date matches today.
#
# Required GitHub repository secrets (same as the buyer-alerts cron):
#   NEXT_PUBLIC_SUPABASE_URL    Supabase project URL
#   SUPABASE_SERVICE_ROLE_KEY   Service-role key (RLS bypass)
#
# Manual trigger: Actions tab → "Follow-ups due cron" → Run workflow.
name: Follow-ups due cron

on:
  schedule:
    # 22:00 UTC = 08:00 AEST (10:00 AEDT during DST).
    # GitHub may queue jobs ~5–15 min during peak load; that's fine, the
    # notifications are still "due today".
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: follow-ups-due-cron
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: Emit follow-up notifications
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run cron:follow-ups-due
