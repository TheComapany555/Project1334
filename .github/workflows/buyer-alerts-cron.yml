# Feature 3: Buyer Listing Alerts — hourly cron, runs entirely on GitHub Actions.
#
# This workflow checks out the repo, installs dependencies, and runs the
# matching engine directly via the `cron:buyer-alerts` npm script. No
# Vercel/Next.js webhook involved — this job talks to Supabase + Resend on
# its own using the service-role key.
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#   NEXT_PUBLIC_SUPABASE_URL    Supabase project URL
#   SUPABASE_SERVICE_ROLE_KEY   Service-role key (RLS bypass — keep tight)
#   RESEND_API_KEY              Resend API key for email delivery
#   EMAIL_FROM                  Sender, e.g. "noreply@salebiz.com.au"
#   NEXTAUTH_URL                Public origin used in email "View listing" links,
#                               e.g. "https://project1334.vercel.app" (no trailing slash)
#
# You can also trigger it manually from the Actions tab → Run workflow.
name: Buyer alerts cron

on:
  schedule:
    # Every hour, on the hour. GitHub may queue jobs by ~5–15 minutes during
    # peak load; the matching engine uses a 25-hour lookback by default so
    # missed runs are caught up safely on the next firing.
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      lookbackHours:
        description: "How many hours of listings to re-evaluate (default 25, max 168)"
        required: false
        default: "25"

permissions:
  contents: read

concurrency:
  group: buyer-alerts-cron
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: Run matching engine
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          LOOKBACK_HOURS: ${{ github.event.inputs.lookbackHours || '25' }}
        run: npm run cron:buyer-alerts
